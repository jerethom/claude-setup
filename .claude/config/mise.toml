# >>> Claude Setup >>>
[tasks.setup]
depends = [
  "config",
  "voltagent",
  "setup:cgc",
  "setup:demongrep",
]

[tasks.config]
run = "mise exec python@3.14.2 -- python3 ./.claude/scripts/sync-config.py"
run_windows = "mise exec python@3.14.2 -- python ./.claude/scripts/sync-config.py"

[tasks."setup:demongrep"]
run = """
mkdir -p ~/.local/share/claude-setup
cd ~/.local/share/claude-setup
git clone https://github.com/yxanul/demongrep.git || true
cd demongrep
git pull
mise exec rust@1.93.0 -- cargo build --release
"""
run_windows = """
if not exist "%LOCALAPPDATA%\\claude-setup" mkdir "%LOCALAPPDATA%\\claude-setup"
cd /d "%LOCALAPPDATA%\\claude-setup"
git clone https://github.com/yxanul/demongrep.git 2>nul || cd .
cd demongrep
git pull
mise exec rust@1.93.0 -- cargo build --release
"""

[tasks."setup:cgc"]
run = [
  "mise exec python@3.14.2 -- pip install codegraphcontext",
]

[tasks."voltagent"]
run = """
claude plugin marketplace add VoltAgent/awesome-claude-code-subagents || true
claude plugin install voltagent-core-dev
claude plugin install voltagent-lang
claude plugin install voltagent-infra
claude plugin install voltagent-qa-sec
claude plugin install voltagent-data-ai
claude plugin install voltagent-dev-exp
claude plugin install voltagent-domains
claude plugin install voltagent-biz
claude plugin install voltagent-meta
claude plugin install voltagent-research
"""

[tasks.update]
run = """
REPO_URL="https://github.com/jerethom/claude-setup"
LOCAL_REPO="$HOME/.local/share/claude-setup/repo"

if [ -d "$LOCAL_REPO/.git" ]; then
  git -C "$LOCAL_REPO" pull
else
  mkdir -p "$(dirname "$LOCAL_REPO")"
  git clone --depth 1 "$REPO_URL" "$LOCAL_REPO"
fi

rm -rf .claude
cp -r "$LOCAL_REPO/.claude" .
"""
run_windows = """
set REPO_URL=https://github.com/jerethom/claude-setup
set LOCAL_REPO=%LOCALAPPDATA%\\claude-setup\\repo

if exist "%LOCAL_REPO%\\.git" (
  git -C "%LOCAL_REPO%" pull
) else (
  if not exist "%LOCAL_REPO%\\.." mkdir "%LOCAL_REPO%\\.."
  git clone --depth 1 "%REPO_URL%" "%LOCAL_REPO%"
)

if exist .claude rmdir /s /q .claude
xcopy /e /i /q "%LOCAL_REPO%\\.claude" .claude
"""

[tasks.docker]
run = "docker compose -f mcp.docker-compose.yml up -d"

[tasks."mcps:setup"]
run = [
  { task = "update" },
  { task = "config" },
  { task = "setup:cgc" },
  { task = "setup:demongrep" },
]

[tasks."mcps:parrallel"]
depends = [
  "cgcwatch",
  "demongrepwatch",
]

[tasks."mcps"]
run = [
  { task = "mcps:setup" },
  { task = "mcps:parrallel" },
]

[tasks.cgcwatch]
run = [
  "mise exec python@3.14.2 -- python3 ./.claude/scripts/fix-cgc-optimizations.py",
  { task = "cgc index ." },
  { task = "cgc watch ." },
]
run_windows = [
  "mise exec python@3.14.2 -- python ./.claude/scripts/fix-cgc-optimizations.py",
  { task = "cgc index ." },
  { task = "cgc watch ." },
]

[tasks.demongrepwatch]
run = [
  { task = "demongrep index ." },
  { task = "demongrep serve ." },
]

[tasks.cgc]
env.NEO4J_URI = "neo4j://localhost:7687"
env.NEO4J_USERNAME = "neo4j"
env.NEO4J_PASSWORD = "password"
env.DEFAULT_DATABASE = "neo4j"
run = "mise exec python@3.14.2 -- cgc"

[tasks.demongrep]
run = "~/.local/share/claude-setup/demongrep/target/release/demongrep"
run_windows = "%LOCALAPPDATA%\\claude-setup\\demongrep\\target\\release\\demongrep.exe"
# <<< Claude Setup <<<